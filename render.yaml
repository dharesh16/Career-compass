services:
  - type: web
    name: career-compass-api
    env: python
    root: career-compass/backend
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: web
    name: career-compass-web
    env: static
    root: career-compass/frontend
    plan: free
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://career-compass-api.onrender.com
