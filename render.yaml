services:
  - type: web
    name: career-compass-api
    runtime: python
    rootDir: career-compass/backend
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9

  - type: web
    name: career-compass-web
    runtime: static
    rootDir: career-compass/frontend
    buildCommand: "npm ci && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://career-compass-api-wpgn.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
